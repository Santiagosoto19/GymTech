version: '3.8'

# Desarrollo: monta el código fuente en vivo y usa Vite/tsx watch.
# Levantar con:  docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build
# App:          http://localhost:5173

services:
  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
      target: dev
    volumes:
      - ./gateway/src:/app/src
    environment:
      NODE_ENV: development
    command: npm run dev

  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
      target: dev
    volumes:
      - ./services/auth-service/src:/app/src
      - ./shared:/app/shared
      - ./shared:/shared
    environment:
      NODE_ENV: development
    command: npm run dev
    ports:
      - "3001:3001"

  membership-service:
    build:
      context: .
      dockerfile: services/membership-service/Dockerfile
      target: dev
    volumes:
      - ./services/membership-service/src:/app/src
      - ./shared:/app/shared
      - ./shared:/shared
    environment:
      NODE_ENV: development
    command: npm run dev
    ports:
      - "3002:3002"

  activity-service:
    build:
      context: .
      dockerfile: services/activity-service/Dockerfile
      target: dev
    volumes:
      - ./services/activity-service/src:/app/src
      - ./shared:/app/shared
      - ./shared:/shared
    environment:
      NODE_ENV: development
    command: npm run dev
    ports:
      - "3003:3003"

  reporting-service:
    build:
      context: .
      dockerfile: services/reporting-service/Dockerfile
      target: dev
    volumes:
      - ./services/reporting-service/src:/app/src
      - ./shared:/app/shared
      - ./shared:/shared
    environment:
      NODE_ENV: development
    command: npm run dev
    ports:
      - "3004:3004"

  notification-service:
    build:
      context: .
      dockerfile: services/notification-service/Dockerfile
      target: dev
    volumes:
      - ./services/notification-service/src:/app/src
      - ./shared:/app/shared
      - ./shared:/shared
    environment:
      NODE_ENV: development
    command: npm run dev
    ports:
      - "3005:3005"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.ts:/app/vite.config.ts
    environment:
      NODE_ENV: development
      VITE_API_PROXY: http://gateway:8080
    command: npm run dev -- --host 0.0.0.0 --port 5173
    ports:
      - "5173:5173"
    depends_on:
      - gateway

  auth-db:
    ports:
      - "5433:5432"

  membership-db:
    ports:
      - "5434:5432"

  activity-db:
    ports:
      - "5435:5432"

  reporting-db:
    ports:
      - "5436:5432"

  notification-db:
    ports:
      - "5437:5432"
